services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: i3e
      POSTGRES_USER: i3e
      POSTGRES_PASSWORD: i3e_dev_only
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U i3e -d i3e"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_dev_only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >-
      /bin/sh -c "until mc alias set local http://minio:9000 minio minio_dev_only; do sleep 1; done;
      mc mb --ignore-existing local/i3e-private;
      mc anonymous set none local/i3e-private"

  clamav:
    image: clamav/clamav:stable
    ports:
      - "3310:3310"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  minio_data:
