name: Deploy static site to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Validate content
        run: pnpm content:validate
      - name: Build
        env:
          NEXT_PUBLIC_SITE_URL: https://beatrizagent.github.io
          NEXT_PUBLIC_BASE_PATH: /i3einformatica
        run: pnpm build
      - name: Validate export
        env:
          NEXT_PUBLIC_SITE_URL: https://beatrizagent.github.io
          NEXT_PUBLIC_BASE_PATH: /i3einformatica
        run: pnpm export:validate
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
